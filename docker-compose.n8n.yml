version: '3.8'

services:
  n8n:
    image: n8nio/n8n:latest
    restart: always
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=changeme-strong-password
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=Asia/Jakarta
      # AI integrations
      - N8N_AI_ENABLED=true
    volumes:
      - n8n_data:/home/node/.n8n
    # Optional: limit resources for local dev
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G

  # Signal vector database (pgvector) — separate from n8n DB
  postgres:
    image: pgvector/pgvector:pg16
    restart: always
    environment:
      - POSTGRES_USER=signal
      - POSTGRES_PASSWORD=changeme
      - POSTGRES_DB=signal
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U signal"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Optional: Redis for queue management
  # redis:
  #   image: redis:7-alpine
  #   restart: always
  #   volumes:
  #     - redis_data:/data

networks:
  internal:
    driver: bridge

volumes:
  n8n_data:
  postgres_data:
